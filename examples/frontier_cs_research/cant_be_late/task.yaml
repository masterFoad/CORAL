task:
  name: "Frontier-CS Research: cant_be_late"
  description: |
    Solve the cant_be_late problem from the Frontier-CS Research benchmark.
    This problem has multiple variants: high_availability_loose_deadline_large_overhead,high_availability_loose_deadline_small_overhead,high_availability_tight_deadline_large_overhead,high_availability_tight_deadline_small_overhead,low_availability_loose_deadline_large_overhead,low_availability_loose_deadline_small_overhead,low_availability_tight_deadline_large_overhead,low_availability_tight_deadline_small_overhead,mixed_availability_loose_deadline_large_overhead,mixed_availability_loose_deadline_small_overhead,mixed_availability_tight_deadline_large_overhead,mixed_availability_tight_deadline_small_overhead.
    Each variant has its own readme in `problems/cant_be_late/{variant}/readme`.
    Save solutions as `solutions/cant_be_late/{variant}/solution.py`.

    ## Solution format

    Each solution must define a `Solution` class:
    ```python
    class Solution:
        def solve(self, spec_path: str = None) -> dict:
            # Return {"code": "your_code"} or {"program_path": "path/to/impl.py"}
            pass
    ```

    The exact API varies by problem — check the readme for details.
  files:
    - "solutions/"
  seed:
    - "solutions/"
    - "problems/"
  tips: |
    - Your score is 0-100 based on solution quality.
    - Invalid or failing solutions score 0.
    - Some problems require GPU (Docker with --gpus).
    - Problem readmes are in problems/cant_be_late/.

grader:
  timeout: 1200
  direction: maximize
  args:
    problems_dir: "/path/to/frontier-cs-research-problems"
    problem_id: "cant_be_late"

agents:
  count: 1
  runtime: claude_code
  model: claude-sonnet-4-6
  max_turns: 200

workspace:
  results_dir: "./results"
  repo_path: "./examples/frontier_cs_research/cant_be_late/seed"

run:
  verbose: false
  ui: false
  tmux: true
