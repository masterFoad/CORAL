task:
  name: "Frontier-CS Research: symbolic_regression"
  description: |
    Solve the symbolic_regression problem from the Frontier-CS Research benchmark.
    This problem has multiple variants: mccormick,mixed_polyexp_4d,peaks,ripple,sincos.
    Each variant has its own readme in `problems/symbolic_regression/{variant}/readme`.
    Save solutions as `solutions/symbolic_regression/{variant}/solution.py`.

    ## Solution format

    Each solution must define a `Solution` class:
    ```python
    class Solution:
        def solve(self, spec_path: str = None) -> dict:
            # Return {"code": "your_code"} or {"program_path": "path/to/impl.py"}
            pass
    ```

    The exact API varies by problem — check the readme for details.
  files:
    - "solutions/"
  seed:
    - "solutions/"
    - "problems/"
  tips: |
    - Your score is 0-100 based on solution quality.
    - Invalid or failing solutions score 0.
    - Some problems require GPU (Docker with --gpus).
    - Problem readmes are in problems/symbolic_regression/.

grader:
  timeout: 1200
  direction: maximize
  args:
    problems_dir: "/path/to/frontier-cs-research-problems"
    problem_id: "symbolic_regression"

agents:
  count: 1
  runtime: claude_code
  model: claude-sonnet-4-6
  max_turns: 200

workspace:
  results_dir: "./results"
  repo_path: "./examples/frontier_cs_research/symbolic_regression/seed"

run:
  verbose: false
  ui: false
  tmux: true
