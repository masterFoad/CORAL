task:
  name: "Frontier-CS Research: imagenet_pareto"
  description: |
    Solve the imagenet_pareto problem from the Frontier-CS Research benchmark.
    This problem has multiple variants: 1m,200k,2_5m,500k,5m.
    Each variant has its own readme in `problems/imagenet_pareto/{variant}/readme`.
    Save solutions as `solutions/imagenet_pareto/{variant}/solution.py`.

    ## Solution format

    Each solution must define a `Solution` class:
    ```python
    class Solution:
        def solve(self, spec_path: str = None) -> dict:
            # Return {"code": "your_code"} or {"program_path": "path/to/impl.py"}
            pass
    ```

    The exact API varies by problem — check the readme for details.
  files:
    - "solutions/"
  seed:
    - "solutions/"
    - "problems/"
  tips: |
    - Your score is 0-100 based on solution quality.
    - Invalid or failing solutions score 0.
    - Some problems require GPU (Docker with --gpus).
    - Problem readmes are in problems/imagenet_pareto/.

grader:
  timeout: 1200
  direction: maximize
  args:
    problems_dir: "/path/to/frontier-cs-research-problems"
    problem_id: "imagenet_pareto"

agents:
  count: 1
  runtime: claude_code
  model: claude-sonnet-4-6
  max_turns: 200

workspace:
  results_dir: "./results"
  repo_path: "./examples/frontier_cs_research/imagenet_pareto/seed"

run:
  verbose: false
  ui: false
  tmux: true
