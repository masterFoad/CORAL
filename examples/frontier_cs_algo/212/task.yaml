task:
  name: "Frontier-CS Algo #212"
  description: |
    Solve algorithmic optimization problem #212 from the Frontier-CS benchmark.
    Read the problem statement in `statement.txt`, then write a C++17 solution
    and save it as `solutions/212.cpp`.

    ## Solution format

    Your solution must be a self-contained C++17 file that:
    - Reads input from stdin
    - Writes output to stdout
    - Compiles with `g++ -std=c++17 -O2`
    - Runs within the per-problem time limit (typically 2-5 seconds)

    ## Strategy tips

    - Start with simpler heuristics (greedy, local search) then iterate.
    - Many problems reward simulated annealing, beam search, or genetic algorithms.
    - Check the scoring formula — some problems score relative to a baseline.
  files:
    - "solutions/212.cpp"
  seed:
    - "statement.txt"
    - "solutions/"
  tips: |
    - Your score is 0-100 based on solution quality, not just correctness.
    - Invalid or crashing solutions score 0.
    - The problem statement is in statement.txt.

grader:
  timeout: 300
  direction: maximize
  args:
    judge_url: "http://localhost:8081"
    problem_id: "212"

agents:
  count: 1
  runtime: claude_code
  model: claude-sonnet-4-6
  max_turns: 200

workspace:
  results_dir: "./results"
  repo_path: "./examples/frontier_cs_algo/212/seed"

run:
  verbose: false
  ui: false
  tmux: true
